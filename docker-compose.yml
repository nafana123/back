services:
  app:
    build: .
    container_name: back-app
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /tmp/air
    command: air -c .air.toml
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: database
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: